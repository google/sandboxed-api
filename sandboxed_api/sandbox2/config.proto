edition = "2024";

package sandbox2;

option optimize_for = LITE_RUNTIME;
option features.utf8_validation = NONE;

message FdMapping {
  // If set, the fd will be dupped onto this requested fd in the sandboxee.
  int32 requested_fd = 1;
  // The name of the fd.
  string name = 2;
}

// Configuration for the sandboxing process.
message SandboxingConfig {
  // Working directory.
  string cwd = 1;
  // Seccomp policy.
  bytes policy_bytes = 2;
  // File descriptor mappings.
  repeated FdMapping fd_mappings = 5;
}
